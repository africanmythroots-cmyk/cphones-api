services:
  - type: web
    name: cphones-api
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build && npx prisma generate
    startCommand: npx prisma db push && node dist/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://cphones-web.vercel.app
