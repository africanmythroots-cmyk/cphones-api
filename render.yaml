services:
  - type: web
    name: cphones-api
    env: node
    buildCommand: npm install && npm run build
    startCommand: npx prisma db push && node dist/index.js
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cphones-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: cphones-db
    plan: free
